<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinguaAgent</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
.app{max-width:600px;margin:0 auto;padding:16px}
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:#fff;border-radius:14px;border:1px solid #e5e5e0;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.logo{font-weight:600;font-size:17px;color:#1a1a1a}
.logo span{color:#2563eb}
.badge{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid #e5e5e0;color:#666;cursor:pointer;background:#fff;font-family:inherit}
.badge:hover{background:#f5f5f0}
.badge.active{background:#ecfdf5;color:#166534;border-color:#a7f3d0}
.card{background:#fff;border-radius:14px;border:1px solid #e5e5e0;padding:18px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.section-label{font-size:11px;color:#999;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.lang-btn{flex:1;padding:12px 8px;border-radius:10px;border:1px solid #e5e5e0;background:#fff;cursor:pointer;font-size:13px;color:#666;transition:all .15s;font-family:inherit}
.lang-btn:hover{background:#f5f5f0}
.lang-btn.sel{border-color:#2563eb;background:#eff6ff;color:#1d4ed8;font-weight:600}
.mode-btn{width:100%;padding:13px 16px;border-radius:10px;border:1px solid #e5e5e0;background:#fff;cursor:pointer;display:flex;align-items:center;gap:12px;margin-bottom:8px;font-family:inherit;transition:all .15s}
.mode-btn:hover{background:#f5f5f0}
.mode-btn.sel{border-color:#2563eb;background:#eff6ff}
.mode-btn.sel .mode-title{color:#1d4ed8}
.mode-title{font-size:14px;font-weight:600;text-align:left;color:#1a1a1a}
.mode-desc{font-size:12px;color:#999;text-align:left}
.primary-btn{width:100%;padding:14px;border-radius:12px;border:none;background:#2563eb;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s}
.primary-btn:hover{opacity:.9}
.back-btn{background:none;border:none;color:#666;cursor:pointer;font-size:13px;padding:4px 0;font-family:inherit}
.back-btn:hover{color:#1a1a1a}
.flip-card{width:100%;min-height:230px;border-radius:14px;border:1.5px solid #e5e5e0;background:#fff;padding:28px 24px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;gap:8px;transition:all .2s;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.flip-card:hover{border-color:#93c5fd}
.flip-card.revealed{border-color:#2563eb;background:#eff6ff}
.word-big{font-size:30px;font-weight:600;color:#1a1a1a}
.word-tr{font-size:19px;font-weight:600;color:#2563eb}
.ipa{font-family:'Courier New',monospace;font-size:13px;color:#999;margin-top:2px}
.pl-badge{font-size:12px;padding:4px 14px;border-radius:20px;background:#f5f5f0;color:#666;border:1px solid #e5e5e0;margin-top:2px}
.example{font-size:13px;color:#666;font-style:italic;margin-top:10px;border-top:1px solid #e5e5e0;padding-top:10px;width:100%;text-align:left}
.example-tr{font-size:12px;color:#aaa;margin-top:3px}
.btn-row{display:flex;gap:10px;margin-top:10px;width:100%}
.btn-wrong{flex:1;padding:11px;border-radius:10px;border:none;background:#fee2e2;color:#991b1b;cursor:pointer;font-weight:600;font-size:13px;font-family:inherit}
.btn-wrong:hover{background:#fecaca}
.btn-right{flex:1;padding:11px;border-radius:10px;border:none;background:#dcfce7;color:#166534;cursor:pointer;font-weight:600;font-size:13px;font-family:inherit}
.btn-right:hover{background:#bbf7d0}
.dir-row{display:flex;gap:6px;justify-content:flex-end;margin-bottom:10px}
.dir-btn{padding:5px 12px;border-radius:20px;border:1px solid #e5e5e0;background:#fff;color:#999;cursor:pointer;font-size:12px;font-family:inherit}
.dir-btn:hover{background:#f5f5f0}
.dir-btn.sel{border-color:#2563eb;color:#2563eb;background:#eff6ff;font-weight:600}
.progress-bar{height:5px;background:#f0f0ec;border-radius:3px;margin-bottom:14px;overflow:hidden}

.progress-info{display:flex;justify-content:space-between;font-size:12px;color:#aaa;margin-bottom:6px}
.dialog-line{padding:13px 0;border-bottom:1px solid #f0f0ec}
.dialog-line:last-child{border-bottom:none}
.dialog-line.playing{background:#eff6ff;margin:0 -18px;padding:13px 18px;border-radius:10px}
.speaker{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#aaa}
.speaker.me{color:#2563eb}
.speak-btn{background:none;border:none;cursor:pointer;font-size:15px;opacity:.45;padding:2px 5px;transition:opacity .15s}
.speak-btn:hover{opacity:1}
.play-all-btn{padding:6px 16px;border-radius:20px;border:1px solid #93c5fd;background:#eff6ff;color:#2563eb;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}
.play-all-btn:hover{background:#dbeafe}
.stop-btn{padding:6px 16px;border-radius:20px;border:1px solid #fca5a5;background:#fee2e2;color:#dc2626;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}
.vocab-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #f0f0ec}
.vocab-row:last-child{border-bottom:none}
.fill-input{width:100%;padding:11px 14px;border-radius:10px;border:1.5px solid #e5e5e0;background:#fafafa;color:#1a1a1a;font-size:14px;outline:none;font-family:inherit;transition:border-color .15s}
.fill-input:focus{border-color:#93c5fd;background:#fff}
.fill-input.ok{border-color:#4ade80;background:#f0fdf4}
.fill-input.bad{border-color:#f87171;background:#fff5f5}
.feedback{margin-top:10px;padding:11px 14px;border-radius:10px;font-size:13px;font-weight:500}
.feedback.ok{background:#dcfce7;color:#166534}
.feedback.bad{background:#fee2e2;color:#991b1b}
.next-btn{width:100%;margin-top:10px;padding:11px;border-radius:10px;border:1.5px solid #93c5fd;background:#eff6ff;color:#2563eb;cursor:pointer;font-weight:600;font-size:14px;font-family:inherit}
.next-btn:hover{background:#dbeafe}
.score-big{font-size:52px;text-align:center;margin:16px 0 8px}
.score-text{font-size:24px;font-weight:600;text-align:center;margin-bottom:6px}
.score-sub{font-size:15px;color:#666;text-align:center;margin-bottom:24px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:#fff;border-radius:18px;border:1px solid #e5e5e0;padding:26px;max-width:460px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.modal-title{font-size:17px;font-weight:600;margin-bottom:6px}
.modal-sub{font-size:13px;color:#666;margin-bottom:18px;line-height:1.6}
.key-input{width:100%;padding:11px 14px;border-radius:10px;border:1.5px solid #e5e5e0;background:#fafafa;color:#1a1a1a;font-family:'Courier New',monospace;font-size:13px;outline:none;margin-bottom:6px}
.key-input:focus{border-color:#93c5fd}
.test-btn{padding:9px 16px;border-radius:10px;border:1px solid #e5e5e0;background:#fff;color:#666;cursor:pointer;font-size:13px;font-family:inherit}
.test-btn:hover{background:#f5f5f0}
.lesson-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid #f0f0ec;cursor:pointer}

.level-badge{font-size:11px;padding:3px 8px;border-radius:6px;background:#f5f5f0;color:#666;border:1px solid #e5e5e0;font-weight:600}
.voice-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f0f0ec}
.voice-row:last-child{border-bottom:none}
</style>

  score:{c:0,t:0},input:"",submitted:false,
  playingLine:-1,playing:false,abort:{v:false},
  elKey:localStorage.getItem("lingua_el_key")||"",
  showEl:false,elKeyInput:"",elMsg:""
};
function set(p){Object.assign(S,p);render();}

// ── AUDIO ─────────────────────────────────────────────────────────────────────
function getBrowserVoice(lang){
  const vs=window.speechSynthesis.getVoices();
  const bcp=LANG_BCP[lang].slice(0,2);
  const prefs={
    EN:["Daniel","Samantha","Karen","Martha","Google UK English Female"],
    FR:["Thomas","Amélie","Amelie","Marie","Google français"],
    IT:["Alice","Luca","Google italiano"]
  }[lang]||[];
  for(const p of prefs){const v=vs.find(x=>x.name===p);if(v)return v;}
  const lv=vs.filter(x=>x.lang.toLowerCase().startsWith(bcp));
  return lv.find(x=>/enhanced|premium/i.test(x.name))||lv[0]||null;
}

function browserSpeak(text,lang){
  return new Promise(res=>{
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    const v=getBrowserVoice(lang);
    if(v){u.voice=v;u.lang=v.lang;}else{u.lang=LANG_BCP[lang];}
    u.rate=0.82;u.pitch=1.05;
    u.onend=res;u.onerror=res;
    window.speechSynthesis.speak(u);
  });
}

async function elSpeak(text,lang){
  const r=await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${EL_VOICES[lang]}`,{
    method:"POST",
    headers:{"xi-api-key":S.elKey,"Content-Type":"application/json"},
    body:JSON.stringify({text,model_id:"eleven_multilingual_v2",
      voice_settings:{stability:0.45,similarity_boost:0.82,style:0.3,use_speaker_boost:true}})
  });
  if(!r.ok)throw new Error("EL "+r.status);
  const blob=await r.blob();
  const url=URL.createObjectURL(blob);
  return new Promise((res,rej)=>{
    const a=new Audio(url);
    a.onended=()=>{URL.revokeObjectURL(url);res();};
    a.onerror=rej;a.play();
  });
}

async function speak(text,lang){
  try{
    if(S.elKey)await elSpeak(text,lang);
    else await browserSpeak(text,lang);
  }catch{await browserSpeak(text,lang);}
}

async function playDialog(dialog,lang){
  const flag={v:false};
  set({playing:true,abort:flag,playingLine:0});
  for(let i=0;i<dialog.length;i++){
    if(flag.v)break;
    set({playingLine:i});
    await speak(dialog[i].l,lang);
    if(flag.v)break;
    await new Promise(r=>setTimeout(r,420));
  }
  set({playing:false,playingLine:-1});
}

function stopDialog(){
  S.abort.v=true;
  window.speechSynthesis.cancel();
  set({playing:false,playingLine:-1});
}

async function testElKey(){
  set({elMsg:"Testuję..."});
  try{
    const r=await fetch("https://api.elevenlabs.io/v1/user",{headers:{"xi-api-key":S.elKeyInput}});
    if(r.ok){
      const d=await r.json();
      const used=d.subscription?.character_count||0;
      const lim=d.subscription?.character_limit||0;
      set({elMsg:"✓ Klucz działa! Użyto: "+used.toLocaleString()+" / "+lim.toLocaleString()+" znaków"});
    }else set({elMsg:"✗ Nieprawidłowy klucz."});
  }catch(e){set({elMsg:"✗ Błąd: "+e.message});}
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function startPractice(lesson,mode){
  const cards=mode==="flashcard"?lesson.vocab:lesson.fill;
  set({screen:"practice",lesson,mode,cards,idx:0,revealed:false,
    dir:"to_pl",score:{c:0,t:0},input:"",submitted:false});
}
function nextCard(){
  const{idx,cards,score}=S;
  if(idx+1>=cards.length){set({screen:"results"});return;}
  set({idx:idx+1,revealed:false,dir:Math.random()>.5?"to_pl":"to_lang",input:"",submitted:false});
}
function h(tag,props,...ch){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(props||{})){
    if(k==="onclick")el.onclick=v;
    else if(k==="oninput")el.oninput=v;
    else if(k==="onkeydown")el.onkeydown=v;
    else if(k==="class")el.className=v;
    else if(k==="style")el.style.cssText=v;
    else el.setAttribute(k,v);
  }
  for(const c of ch){
    if(c==null)continue;
    if(typeof c==="string")el.appendChild(document.createTextNode(c));
    else el.appendChild(c);
  }
  return el;
}

  dh.appendChild(playing

    row.appendChild(top);
    row.appendChild(h("div",{style:"font-size:15px;margin-bottom:3px;color:#1a1a1a"},line.l));
    row.appendChild(h("div",{style:"font-size:12px;color:#aaa;font-style:italic"},line.t));

  });

  // vocab
  const vc=h("div",{class:"card"});
  vc.appendChild(h("div",{class:"section-label"},"Słowniczek ("+lesson.vocab.length+" zwrotów)"));

    info.appendChild(h("div",{style:"font-size:14px;font-weight:600;color:#1a1a1a"},v.w));
    info.appendChild(h("div",{style:"font-size:13px;color:#2563eb;margin-top:1px"},v.tr));

    vc.appendChild(row);
  });

  // practice
  const pc=h("div",{class:"card"});
  pc.appendChild(h("div",{class:"section-label"},"Ćwicz ten materiał"));
  const br=h("div",{style:"display:flex;gap:8px"});
  br.appendChild(h("button",{class:"primary-btn",style:"flex:1",onclick:()=>startPractice(lesson,"flashcard")},"🃏 Fiszki"));
  br.appendChild(h("button",{class:"primary-btn",style:"flex:1;background:#fff;color:#2563eb;border:1.5px solid #93c5fd",onclick:()=>startPractice(lesson,"fill")},"✏️ Uzupełnianie"));
  pc.appendChild(br);
  w.appendChild(pc);
  return w;
}

function renderPractice(){
  const{lesson,mode,cards,idx,revealed,dir,score,input,submitted,lang}=S;
  const card=cards[idx];
  const w=h("div",{});
  w.appendChild(h("div",{class:"header"},
    h("button",{class:"back-btn",onclick:()=>set({screen:"lesson"})},"← Lekcja"),
    h("span",{style:"font-weight:600"},mode==="flashcard"?"🃏 Fiszki":"✏️ Uzupełnianie"),
    h("span",{style:"font-size:12px;color:#aaa"},lesson.title)
  ));

  w.appendChild(h("div",{class:"progress-info"},
    h("span",{},(idx+1)+" / "+cards.length),
    h("span",{},"✓ "+score.c+" / "+score.t)
  ));
  const pb=h("div",{class:"progress-bar"});
  pb.appendChild(h("div",{class:"progress-fill",style:"width:"+Math.round(idx/cards.length*100)+"%"}));
  w.appendChild(pb);

  if(mode==="flashcard"){
    const dr=h("div",{class:"dir-row"});
    [["to_pl","→ 🇵🇱"],["to_lang","🇵🇱 →"],["mix","🔀 mix"]].forEach(([d,label])=>{
      dr.appendChild(h("button",{class:"dir-btn"+(dir===d?" sel":""),
        onclick:()=>set({dir:d==="mix"?(Math.random()>.5?"to_pl":"to_lang"):d,revealed:false})},label));
    });
    w.appendChild(dr);

    const fc=h("div",{class:"flip-card"+(revealed?" revealed":""),
      onclick:()=>{if(!revealed)set({revealed:true});}});
    const topl=dir==="to_pl";
    fc.appendChild(h("div",{style:"font-size:11px;color:#aaa;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px"},
      topl?(LANGS[lang].name+" → Polski"):("Polski → "+LANGS[lang].name)));
    if(topl){
      fc.appendChild(h("div",{class:"word-big"},card.w));
      fc.appendChild(h("button",{class:"speak-btn",style:"font-size:19px;margin:4px 0",
        onclick:(e)=>{e.stopPropagation();speak(card.w,lang);}},"🔊"));
      if(!revealed)fc.appendChild(h("div",{style:"color:#ccc;font-size:13px;margin-top:10px"},"Dotknij aby ujawnić →"));
      else{
        fc.appendChild(h("div",{class:"word-tr"},card.tr));
        fc.appendChild(h("div",{class:"ipa"},card.ipa));
        fc.appendChild(h("div",{class:"pl-badge"},"czytaj: "+card.pl));
        if(card.ex){
          const ex=h("div",{class:"example"});
          ex.appendChild(h("div",{},card.ex));
          ex.appendChild(h("div",{class:"example-tr"},card.exT));
          fc.appendChild(ex);
        }
      }
    }else{
      fc.appendChild(h("div",{class:"word-tr",style:"font-size:22px"},card.tr));
      if(!revealed)fc.appendChild(h("div",{style:"color:#ccc;font-size:13px;margin-top:10px"},"Dotknij aby ujawnić →"));
      else{
        fc.appendChild(h("div",{class:"word-big"},card.w));
        fc.appendChild(h("button",{class:"speak-btn",style:"font-size:19px;margin:4px 0",
          onclick:(e)=>{e.stopPropagation();speak(card.w,lang);}},"🔊"));
        fc.appendChild(h("div",{class:"ipa"},card.ipa));
        fc.appendChild(h("div",{class:"pl-badge"},"czytaj: "+card.pl));
        if(card.ex){
          const ex=h("div",{class:"example"});
          ex.appendChild(h("div",{},card.ex));
          ex.appendChild(h("div",{class:"example-tr"},card.exT));
          fc.appendChild(ex);
        }
      }
    }
    w.appendChild(fc);
    if(revealed){
      const br=h("div",{class:"btn-row"});
      br.appendChild(h("button",{class:"btn-wrong",onclick:()=>{set({score:{c:score.c,t:score.t+1}});nextCard();}},"✗ Nie wiedziałam"));
      br.appendChild(h("button",{class:"btn-right",onclick:()=>{set({score:{c:score.c+1,t:score.t+1}});nextCard();}},"✓ Wiedziałam!"));
      w.appendChild(br);
    }
  }

  if(mode==="fill"){
    const fc=h("div",{class:"card"});
    fc.appendChild(h("div",{style:"font-size:12px;color:#aaa;margin-bottom:8px"},"Wskazówka: "+card.h));
    fc.appendChild(h("div",{style:"font-size:19px;margin-bottom:18px;line-height:1.8;color:#1a1a1a"},card.s));
    const ok=submitted&&input.trim().toLowerCase()===card.a.toLowerCase();
    const bad=submitted&&input.trim().toLowerCase()!==card.a.toLowerCase();
    const inp=h("input",{type:"text",class:"fill-input"+(ok?" ok":bad?" bad":""),
      placeholder:"Wpisz brakujące słowo...",value:input,
      oninput:(e)=>set({input:e.target.value}),
      onkeydown:(e)=>{if(e.key==="Enter"&&!submitted)set({submitted:true});}});
    fc.appendChild(inp);
    if(!submitted)fc.appendChild(h("button",{class:"next-btn",style:"background:#2563eb;color:#fff;border:none",
      onclick:()=>set({submitted:true})},"Sprawdź ✓"));
    if(submitted){
      fc.appendChild(h("div",{class:"feedback "+(ok?"ok":"bad")},
        ok?"✓ Brawo! Poprawnie!":"✗ Poprawna odpowiedź: "+card.a));
      fc.appendChild(h("button",{class:"next-btn",
        onclick:()=>{set({score:{c:ok?score.c+1:score.c,t:score.t+1}});nextCard();}},"Następne →"));
    }
    w.appendChild(fc);
  }
  return w;
}

function renderResults(){
  const{score,lesson,mode}=S;
  const pct=score.t>0?score.c/score.t:0;
  const w=h("div",{});
  const c=h("div",{class:"card",style:"text-align:center;padding:36px 24px"});
  c.appendChild(h("div",{class:"score-big"},pct>=.8?"🏆":pct>=.5?"💪":"📚"));
  c.appendChild(h("div",{class:"score-text"},"Sesja zakończona!"));
  c.appendChild(h("div",{class:"score-sub"},score.c+" / "+score.t+" poprawnych"));
  const br=h("div",{style:"display:flex;gap:8px"});
  br.appendChild(h("button",{class:"primary-btn",style:"flex:1",onclick:()=>startPractice(lesson,mode)},"🔄 Jeszcze raz"));
  br.appendChild(h("button",{class:"primary-btn",style:"flex:1;background:#fff;color:#2563eb;border:1.5px solid #93c5fd",onclick:()=>set({screen:"lesson"})},"📖 Dialog"));
  br.appendChild(h("button",{class:"primary-btn",style:"flex:1;background:#fff;color:#666;border:1px solid #e5e5e0",onclick:()=>set({screen:"home"})},"← Menu"));
  c.appendChild(br);

  return w;
}

function renderElModal(){
  const{elKeyInput,elMsg,elKey}=S;
  const ov=h("div",{class:"modal-overlay",onclick:(e)=>{if(e.target===ov)set({showEl:false});}});
  const m=h("div",{class:"modal"});
  m.appendChild(h("div",{style:"display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"},
    h("div",{class:"modal-title"},"🎙️ Lektor ElevenLabs"),
    h("button",{style:"background:none;border:none;font-size:20px;cursor:pointer;color:#aaa",onclick:()=>set({showEl:false})},"✕")
  ));
  m.appendChild(h("div",{class:"modal-sub"},
    "Naturalne głosy AI. Darmowe konto na elevenlabs.io → Developers → API Keys → Create Key. Klucz widoczny tylko raz — skopiuj go od razu!"));

  m.appendChild(h("div",{class:"section-label"},"Głosy lektorów"));
  [["EN","Sarah","British English"],["FR","Daniel","French"],["IT","Jessica","Italian"]].forEach(([lc,name,desc])=>{
    const row=h("div",{class:"voice-row"});
    row.appendChild(h("div",{},
      h("div",{style:"font-size:13px;font-weight:600"},LANGS[lc].flag+" "+name),
      h("div",{style:"font-size:12px;color:#aaa"},desc)
    ));
    row.appendChild(h("button",{class:"test-btn",onclick:async()=>{
      const txt={EN:"Hello! I'm your English teacher.",FR:"Bonjour ! Je suis votre professeur.",IT:"Ciao! Sono la tua insegnante."}[lc];
      if(S.elKey){try{await elSpeak(txt,lc);}catch{await browserSpeak(txt,lc);}}
      else await browserSpeak(txt,lc);
    }},"▶ Test"));
    m.appendChild(row);
  });

  m.appendChild(h("div",{class:"section-label",style:"margin-top:16px"},"Klucz API ElevenLabs"));
  const ki=h("input",{type:"password",class:"key-input",placeholder:"sk_...",value:elKeyInput,
    oninput:(e)=>set({elKeyInput:e.target.value,elMsg:""})});
  m.appendChild(ki);
  m.appendChild(h("div",{style:"font-size:11px;color:#aaa;margin-bottom:12px"},
    "Klucz zapisywany lokalnie w przeglądarce — nie wysyłamy go nigdzie."));

  if(elMsg){
    const ok=elMsg.startsWith("✓");
    m.appendChild(h("div",{style:"padding:10px 14px;border-radius:10px;margin-bottom:12px;font-size:13px;font-weight:500;"+(ok?"background:#dcfce7;color:#166534":"background:#fee2e2;color:#991b1b")},elMsg));
  }
  if(elKey)m.appendChild(h("div",{style:"padding:10px 14px;border-radius:10px;margin-bottom:12px;font-size:13px;font-weight:500;background:#dcfce7;color:#166534"},"✓ ElevenLabs aktywny"));

  const br=h("div",{style:"display:flex;gap:8px"});
  br.appendChild(h("button",{class:"test-btn",onclick:testElKey},"Testuj klucz"));
  br.appendChild(h("button",{class:"primary-btn",style:"flex:1",onclick:()=>{
    const k=S.elKeyInput.trim();
    localStorage.setItem("lingua_el_key",k);
    set({elKey:k,showEl:false,elMsg:""});
  }},"✓ Zapisz"));
  if(elKey)br.appendChild(h("button",{class:"test-btn",style:"color:#dc2626;border-color:#fca5a5",onclick:()=>{
    localStorage.removeItem("lingua_el_key");
    set({elKey:"",elKeyInput:"",showEl:false});
  }},"Usuń klucz"));
  m.appendChild(br);
  ov.appendChild(m);
  return ov;
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function render(){
  const root=document.getElementById("root");
  root.innerHTML="";
  const{screen}=S;
  if(screen==="home")root.appendChild(renderHome());
  else if(screen==="lesson")root.appendChild(renderLesson());
  else if(screen==="practice")root.appendChild(renderPractice());
  else if(screen==="results")root.appendChild(renderResults());
  if(S.showEl)document.body.appendChild(renderElModal());
}

window.speechSynthesis.onvoiceschanged=()=>{};
setTimeout(render,50);
