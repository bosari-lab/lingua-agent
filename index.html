<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinguaAgent</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f7f5;color:#1a1a1a;min-height:100vh}
.app{max-width:620px;margin:0 auto;padding:14px}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#fff;border-radius:14px;border:1px solid #e8e8e4;margin-bottom:14px}
.logo{font-weight:700;font-size:17px;letter-spacing:-.3px}
.logo span{color:#2563eb}
.hbtn{padding:6px 12px;border-radius:20px;border:1px solid #e8e8e4;background:#fff;color:#666;cursor:pointer;font-size:12px;font-family:inherit}
.hbtn:hover{background:#f7f7f5}
.hbtn.on{background:#ecfdf5;color:#166534;border-color:#a7f3d0}

/* LANG TABS */
.lang-tabs{display:flex;gap:0;background:#fff;border-radius:14px;border:1px solid #e8e8e4;margin-bottom:14px;overflow:hidden}
.lang-tab{flex:1;padding:14px 8px;border:none;background:transparent;cursor:pointer;font-size:14px;font-family:inherit;color:#888;border-right:1px solid #e8e8e4;transition:all .15s;text-align:center}
.lang-tab:last-child{border-right:none}
.lang-tab:hover{background:#f7f7f5;color:#444}
.lang-tab.sel{background:#eff6ff;color:#1d4ed8;font-weight:700}
.lang-flag{font-size:22px;display:block;margin-bottom:3px}
.lang-name{font-size:11px;letter-spacing:.5px}

/* CARDS */
.card{background:#fff;border-radius:14px;border:1px solid #e8e8e4;padding:18px;margin-bottom:12px}
.card-title{font-size:16px;font-weight:700;margin-bottom:2px}
.card-meta{font-size:12px;color:#aaa;margin-bottom:14px}
.sec-label{font-size:10px;color:#bbb;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}

/* LESSON ACTION BUTTONS */
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.action-btn{padding:13px 10px;border-radius:12px;border:1px solid #e8e8e4;background:#fafafa;cursor:pointer;text-align:center;font-family:inherit;transition:all .15s}
.action-btn:hover{background:#f0f0ec;border-color:#ccc}
.action-btn .aicon{font-size:22px;margin-bottom:4px}
.action-btn .alabel{font-size:12px;font-weight:600;color:#444}
.action-btn .adesc{font-size:11px;color:#aaa;margin-top:1px}

/* BACK NAV */
.back-btn{background:none;border:none;color:#888;cursor:pointer;font-size:13px;font-family:inherit;padding:4px 0;margin-bottom:12px;display:flex;align-items:center;gap:4px}
.back-btn:hover{color:#1a1a1a}

/* DIALOG */
.dialog-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.play-btn{padding:7px 16px;border-radius:20px;border:1px solid #93c5fd;background:#eff6ff;color:#2563eb;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}
.play-btn:hover{background:#dbeafe}
.stop-btn{padding:7px 16px;border-radius:20px;border:1px solid #fca5a5;background:#fee2e2;color:#dc2626;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}
.dline{padding:12px 0;border-bottom:1px solid #f0f0ec;transition:background .2s}
.dline:last-child{border-bottom:none}
.dline.active{background:#eff6ff;margin:0 -18px;padding:12px 18px;border-radius:8px}
.spk{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#bbb;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.spk.me{color:#2563eb}
.spk-btn{background:none;border:none;cursor:pointer;font-size:14px;opacity:.4;font-family:inherit}
.spk-btn:hover{opacity:1}

/* VOCAB */
.vrow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #f0f0ec}
.vrow:last-child{border-bottom:none}

/* FLASHCARD */
.fc{width:100%;min-height:230px;border-radius:14px;border:2px solid #e8e8e4;background:#fff;padding:28px 22px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;gap:8px;transition:all .2s;margin-bottom:10px}
.fc:hover{border-color:#93c5fd}
.fc.open{border-color:#2563eb;background:#eff6ff}
.fc-lang{font-size:10px;color:#bbb;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.fc-word{font-size:30px;font-weight:700}
.fc-tr{font-size:19px;font-weight:600;color:#2563eb}
.fc-ipa{font-family:monospace;font-size:13px;color:#aaa}
.fc-pl{font-size:12px;padding:3px 14px;border-radius:20px;background:#f7f7f5;border:1px solid #e8e8e4;color:#666}
.fc-ex{font-size:13px;color:#888;font-style:italic;border-top:1px solid #e8e8e4;padding-top:10px;margin-top:6px;width:100%;text-align:left}
.fc-ex-tr{font-size:12px;color:#bbb;margin-top:2px}
.hint{color:#ccc;font-size:13px;margin-top:8px}
.dir-row{display:flex;gap:6px;justify-content:flex-end;margin-bottom:10px}
.dir-btn{padding:4px 11px;border-radius:20px;border:1px solid #e8e8e4;background:#fff;color:#aaa;cursor:pointer;font-size:12px;font-family:inherit}
.dir-btn.sel{border-color:#2563eb;color:#2563eb;background:#eff6ff;font-weight:600}
.ans-row{display:flex;gap:10px;margin-top:2px}
.btn-no{flex:1;padding:11px;border-radius:10px;border:none;background:#fee2e2;color:#991b1b;cursor:pointer;font-weight:600;font-size:13px;font-family:inherit}
.btn-no:hover{background:#fecaca}
.btn-yes{flex:1;padding:11px;border-radius:10px;border:none;background:#dcfce7;color:#166534;cursor:pointer;font-weight:600;font-size:13px;font-family:inherit}
.btn-yes:hover{background:#bbf7d0}

/* FILL */
.fill-card{background:#fff;border-radius:14px;border:1px solid #e8e8e4;padding:20px;margin-bottom:10px}
.fill-sentence{font-size:19px;margin-bottom:18px;line-height:1.9}
.fill-inp{width:100%;padding:11px 14px;border-radius:10px;border:1.5px solid #e8e8e4;background:#fafafa;color:#1a1a1a;font-size:14px;outline:none;font-family:inherit}
.fill-inp:focus{border-color:#93c5fd;background:#fff}
.fill-inp.ok{border-color:#4ade80;background:#f0fdf4}
.fill-inp.bad{border-color:#f87171;background:#fff5f5}
.feedback{margin-top:10px;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:500}
.feedback.ok{background:#dcfce7;color:#166534}
.feedback.bad{background:#fee2e2;color:#991b1b}
.next-btn{width:100%;margin-top:10px;padding:11px;border-radius:10px;border:1.5px solid #93c5fd;background:#eff6ff;color:#2563eb;cursor:pointer;font-weight:600;font-size:14px;font-family:inherit}
.next-btn:hover{background:#dbeafe}
.check-btn{width:100%;padding:11px;border-radius:10px;border:none;background:#2563eb;color:#fff;cursor:pointer;font-weight:600;font-size:14px;font-family:inherit;margin-top:10px}

/* GRAMMAR */
.grammar-block{border-left:3px solid #2563eb;padding:10px 14px;margin-bottom:12px;background:#f8faff;border-radius:0 10px 10px 0}
.grammar-rule{font-size:14px;font-weight:600;margin-bottom:4px}
.grammar-ex{font-size:13px;color:#666;font-style:italic}
.grammar-extr{font-size:12px;color:#aaa;margin-top:2px}

/* PROGRESS */
.prog-info{display:flex;justify-content:space-between;font-size:12px;color:#bbb;margin-bottom:5px}
.prog-bar{height:5px;background:#f0f0ec;border-radius:3px;margin-bottom:14px}
.prog-fill{height:100%;border-radius:3px;background:#2563eb;transition:width .3s}

/* RESULTS */
.result-card{background:#fff;border-radius:14px;border:1px solid #e8e8e4;padding:36px 24px;text-align:center}

/* SETTINGS PANEL (inline, no fixed) */
.settings-panel{background:#fff;border-radius:14px;border:1px solid #e8e8e4;padding:20px;margin-bottom:12px}
.settings-title{font-size:15px;font-weight:700;margin-bottom:4px}
.settings-sub{font-size:12px;color:#aaa;margin-bottom:16px;line-height:1.5}
.key-inp{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid #e8e8e4;background:#fafafa;color:#1a1a1a;font-family:monospace;font-size:13px;outline:none;margin-bottom:6px}
.key-inp:focus{border-color:#93c5fd}
.row{display:flex;gap:8px;align-items:center}
.sbtn{padding:9px 14px;border-radius:10px;border:1px solid #e8e8e4;background:#fff;color:#666;cursor:pointer;font-size:13px;font-family:inherit}
.sbtn:hover{background:#f7f7f5}
.sbtn.danger{color:#dc2626;border-color:#fca5a5}
.msg-ok{padding:9px 14px;border-radius:10px;background:#dcfce7;color:#166534;font-size:13px;font-weight:500;margin:8px 0}
.msg-err{padding:9px 14px;border-radius:10px;background:#fee2e2;color:#991b1b;font-size:13px;font-weight:500;margin:8px 0}
.primary{flex:1;padding:10px;border-radius:10px;border:none;background:#2563eb;color:#fff;cursor:pointer;font-weight:600;font-size:14px;font-family:inherit}
.primary:hover{opacity:.9}

/* VOICE ROWS */
.vtest-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0ec}
.vtest-row:last-child{border-bottom:none}
</style>
</head>
<body>
<div class="app" id="root"></div>
<script>
const LANGS={EN:{name:"English",flag:"🇬🇧"},FR:{name:"Français",flag:"🇫🇷"},IT:{name:"Italiano",flag:"🇮🇹"}};
const LANG_BCP={EN:"en-GB",FR:"fr-FR",IT:"it-IT"};
// ElevenLabs voice IDs
const EL_VOICES={
  EN:{id:"EXAVITQu4vr4xnSDxMaL",name:"Sarah",desc:"British English"},
  FR:{id:"fr-FR-Standard-A",name:"Charlotte",desc:"Français"},  
  IT:{id:"cgSgspJ2msm6clMCkdW9",name:"Jessica",desc:"Italiano"}
};

const COURSE={
  EN:[
    {id:"en1",title:"At the café",level:"A1",topic:"Zamawianie w kawiarni",type:"dialog",
     dialog:[
      {s:"Barista",l:"Good morning! What can I get for you?",t:"Dzień dobry! Co mogę podać?"},
      {s:"Aleksandra",l:"Hi! I'd like a large coffee, please.",t:"Cześć! Poproszę dużą kawę."},
      {s:"Barista",l:"Would you like milk or sugar?",t:"Mleko czy cukier?"},
      {s:"Aleksandra",l:"Milk please. Do you have any pastries?",t:"Mleko proszę. Czy są ciastka?"},
      {s:"Barista",l:"Yes, we have croissants and muffins.",t:"Tak, mamy croissanty i muffiny."},
      {s:"Aleksandra",l:"I'll take a croissant. How much is that?",t:"Poproszę croissanta. Ile to kosztuje?"},
      {s:"Barista",l:"Four pounds fifty, please.",t:"Cztery funty pięćdziesiąt."},
      {s:"Aleksandra",l:"Here you go. Thank you!",t:"Proszę. Dziękuję!"}
     ],
     vocab:[
      {w:"I'd like…",tr:"Chciałabym… / Poproszę…",ipa:"/aɪd laɪk/",pl:"ajd lajk",ex:"I'd like a coffee, please.",exT:"Poproszę kawę."},
      {w:"Would you like…?",tr:"Czy chciałabyś…?",ipa:"/wʊd juː laɪk/",pl:"łud ju lajk",ex:"Would you like milk?",exT:"Czy chciałabyś mleko?"},
      {w:"How much is that?",tr:"Ile to kosztuje?",ipa:"/haʊ mʌtʃ ɪz ðæt/",pl:"hau macz iz dat",ex:"How much is that?",exT:"Ile to kosztuje?"},
      {w:"Here you go.",tr:"Proszę. / Tu masz.",ipa:"/hɪər juː ɡəʊ/",pl:"hier ju gow",ex:"Here you go!",exT:"Proszę!"},
      {w:"pastry",tr:"ciastko / wypieki",ipa:"/ˈpeɪstri/",pl:"PEJST-ri",ex:"Do you have any pastries?",exT:"Czy macie ciastka?"}
     ],
     fill:[
      {s:"I ___ like a large coffee, please.",a:"would",h:"grzeczna prośba (skrót: I'd)"},
      {s:"___ much is a croissant?",a:"How",h:"jak pytamy o cenę"},
      {s:"Would you like milk ___ sugar?",a:"or",h:"lub / albo"}
     ],
     grammar:[
      {rule:"I'd like = I would like",ex:"I'd like a coffee.",exT:"Poproszę kawę.",note:"Grzeczna forma zamawiania. Zawsze z bezokolicznikiem."},
      {rule:"Would you like…? = Czy chciałabyś…?",ex:"Would you like milk?",exT:"Czy chciałabyś mleko?",note:"Uprzejme pytanie o preferencje."},
      {rule:"How much…? — pytanie o cenę",ex:"How much is that?",exT:"Ile to kosztuje?",note:"'How much' używamy z rzeczownikami niepoliczalnymi i pytaniami o cenę."}
     ]},
    {id:"en2",title:"Getting around",level:"A2",topic:"Pytanie o drogę",type:"dialog",
     dialog:[
      {s:"Aleksandra",l:"Excuse me, how do I get to the station?",t:"Przepraszam, jak dojść do stacji?"},
      {s:"Passerby",l:"Go straight ahead and then turn left.",t:"Proszę iść prosto, potem skręcić w lewo."},
      {s:"Aleksandra",l:"Is it far from here?",t:"Czy to daleko stąd?"},
      {s:"Passerby",l:"Not really — about ten minutes on foot.",t:"Niespecjalnie — około dziesięciu minut piechotą."},
      {s:"Aleksandra",l:"Great, thank you so much!",t:"Świetnie, bardzo dziękuję!"},
      {s:"Passerby",l:"No problem. Have a good journey!",t:"Nie ma problemu. Szczęśliwej podróży!"}
     ],
     vocab:[
      {w:"Excuse me",tr:"Przepraszam (zagadując)",ipa:"/ɪkˈskjuːz miː/",pl:"iks-KJUZ mi",ex:"Excuse me, where is the museum?",exT:"Przepraszam, gdzie jest muzeum?"},
      {w:"Go straight ahead",tr:"Proszę iść prosto",ipa:"/ɡəʊ streɪt/",pl:"gow strejt",ex:"Go straight ahead for 200 metres.",exT:"Proszę iść prosto 200 metrów."},
      {w:"turn left / right",tr:"skręć w lewo / prawo",ipa:"/tɜːn lɛft/",pl:"tern left",ex:"Turn right at the lights.",exT:"Skręć w prawo przy światłach."},
      {w:"on foot",tr:"pieszo / piechotą",ipa:"/ɒn fʊt/",pl:"on fut",ex:"It's ten minutes on foot.",exT:"To dziesięć minut piechotą."},
      {w:"Have a good journey!",tr:"Szczęśliwej podróży!",ipa:"/hæv ə ɡʊd ˈdʒɜːni/",pl:"hew e gud DŻER-ni",ex:"Have a good journey!",exT:"Szczęśliwej podróży!"}
     ],
     fill:[
      {s:"How do I ___ to the station?",a:"get",h:"dostać się (do miejsca)"},
      {s:"Is it ___ from here?",a:"far",h:"daleko"},
      {s:"It's ten minutes ___ foot.",a:"on",h:"piechotą = on ___"}
     ],
     grammar:[
      {rule:"How do I get to…? — jak dojść do…?",ex:"How do I get to the station?",exT:"Jak dojść do stacji?",note:"Standardowe pytanie o drogę. Możesz też: 'Where is…?' (Gdzie jest…?)"},
      {rule:"Tryb rozkazujący do dawania wskazówek",ex:"Go straight. Turn left. Take the bus.",exT:"Idź prosto. Skręć w lewo. Jedź autobusem.",note:"W angielskim wskazówki dajemy bezokolicznikiem bez podmiotu."},
      {rule:"'about' = około (przybliżenie)",ex:"It's about ten minutes.",exT:"To około dziesięciu minut.",note:"'About' przed liczbą oznacza przybliżenie, jak polskie 'około'."}
     ]}
  ],
  FR:[
    {id:"fr1",title:"Au café",level:"A1",topic:"Zamawianie w kawiarni",type:"dialog",
     dialog:[
      {s:"Serveur",l:"Bonjour ! Vous désirez ?",t:"Dzień dobry! Czego sobie Pani życzy?"},
      {s:"Aleksandra",l:"Bonjour ! Je voudrais un café, s'il vous plaît.",t:"Dzień dobry! Poproszę kawę."},
      {s:"Serveur",l:"Un café crème ou un café noir ?",t:"Kawę z mlekiem czy czarną?"},
      {s:"Aleksandra",l:"Un café crème, merci. Et avez-vous des croissants ?",t:"Z mlekiem, dziękuję. Czy macie croissanty?"},
      {s:"Serveur",l:"Oui, bien sûr. C'est tout ?",t:"Tak, oczywiście. Czy to wszystko?"},

     ],
     vocab:[
      {w:"Je voudrais…",tr:"Chciałabym… / Poproszę…",ipa:"/ʒə vudʁɛ/",pl:"że wu-DRE",ex:"Je voudrais un café.",exT:"Poproszę kawę."},
      {w:"s'il vous plaît",tr:"proszę (grzecznościowe)",ipa:"/sil vu plɛ/",pl:"sil wu PLE",ex:"L'addition, s'il vous plaît.",exT:"Rachunek, proszę."},
      {w:"C'est combien ?",tr:"Ile to kosztuje?",ipa:"/sɛ kɔ̃bjɛ̃/",pl:"se ko-BIEŃ",ex:"C'est combien ?",exT:"Ile kosztuje?"},
      {w:"Voilà",tr:"Proszę / Oto (podając coś)",ipa:"/vwala/",pl:"łwa-LA",ex:"Voilà votre café.",exT:"Proszę, oto kawa."},
      {w:"bien sûr",tr:"oczywiście",ipa:"/bjɛ̃ syʁ/",pl:"bień SUR",ex:"Oui, bien sûr !",exT:"Tak, oczywiście!"}
     ],
     fill:[
      {s:"Je ___ un café, s'il vous plaît.",a:"voudrais",h:"chciałabym (vouloir, tryb warunkowy)"},
      {s:"C'est ___, s'il vous plaît ?",a:"combien",h:"ile (kosztuje)"},
      {s:"Merci ___ !",a:"beaucoup",h:"bardzo (dziękuję bardzo)"}
     ],
     grammar:[
      {rule:"Je voudrais = Chciałabym (tryb warunkowy)",ex:"Je voudrais un café.",exT:"Poproszę kawę.",note:"Grzeczniejsze niż 'je veux' (chcę). W restauracji zawsze używaj 'je voudrais'."},
      {rule:"'vous' vs 'tu' — formy grzecznościowe",ex:"Vous désirez ? / Tu veux quoi ?",exT:"Czego sobie Pan/Pani życzy? / Co chcesz?",note:"'Vous' używamy z nieznajomymi i w sytuacjach formalnych. 'Tu' z przyjaciółmi."},
      {rule:"Pytanie przez inwersję: avez-vous?",ex:"Avez-vous des croissants ?",exT:"Czy macie croissanty?",note:"Formalne pytanie — czasownik przed podmiotem. Mniej formalnie: 'Vous avez des croissants ?'"}
     ]},
    {id:"fr2",title:"Se présenter",level:"A1",topic:"Przedstawianie się",type:"dialog",
     dialog:[
      {s:"Marc",l:"Bonjour, je m'appelle Marc. Et toi ?",t:"Cześć, nazywam się Marc. A ty?"},
      {s:"Aleksandra",l:"Bonjour ! Je m'appelle Aleksandra. Je suis polonaise.",t:"Cześć! Jestem Polką."},
      {s:"Marc",l:"Enchantée ! Tu habites à Paris ?",t:"Miło mi! Mieszkasz w Paryżu?"},
      {s:"Aleksandra",l:"Non, j'habite à Varsovie, mais je visite Paris.",t:"Nie, mieszkam w Warszawie, ale odwiedzam Paryż."},
      {s:"Marc",l:"Tu parles très bien français !",t:"Mówisz bardzo dobrze po francusku!"},

     ],

      {w:"Je suis polonaise",tr:"Jestem Polką",ipa:"/ʒə sɥi pɔlɔnɛz/",pl:"że swi polo-NEZ",ex:"Je suis polonaise.",exT:"Jestem Polką."},
      {w:"J'habite à…",tr:"Mieszkam w…",ipa:"/ʒabit a/",pl:"ża-BIT a",ex:"J'habite à Varsovie.",exT:"Mieszkam w Warszawie."},
      {w:"Enchanté/e",tr:"Miło mi (poznać Cię)",ipa:"/ɑ̃ʃɑ̃te/",pl:"an-szan-TE",ex:"Enchantée !",exT:"Miło mi!"},
      {w:"depuis",tr:"od (czasu)",ipa:"/dəpɥi/",pl:"de-PWI",ex:"J'apprends depuis six mois.",exT:"Uczę się od sześciu miesięcy."}
     ],
     fill:[
      {s:"Je ___ Aleksandra.",a:"m'appelle",h:"nazywam się"},
      {s:"J'___ à Varsovie.",a:"habite",h:"mieszkam"},
      {s:"J'apprends le français ___ six mois.",a:"depuis",h:"od (czasu)"}
     ],
     grammar:[
      {rule:"Czasowniki zwrotne: se appeler → je m'appelle",ex:"Je m'appelle Aleksandra.",exT:"Nazywam się Aleksandra.",note:"'S'appeler' = nazywać się. Odmiana: je m'appelle, tu t'appelles, il/elle s'appelle."},
      {rule:"'depuis' = od (z czasem teraźniejszym!)",ex:"J'apprends depuis six mois.",exT:"Uczę się od sześciu miesięcy.",note:"Uwaga! Po 'depuis' w znaczeniu 'od X czasu' używamy czasu teraźniejszego, nie przeszłego."},
      {rule:"Przymiotniki narodowości mają rodzaj",ex:"Je suis polonais. / Je suis polonaise.",exT:"Jestem Polakiem. / Jestem Polką.",note:"Kobiety dodają -e na końcu. polonais → polonaise, français → française."}
     ]}
  ],
  IT:[
    {id:"it1",title:"Al bar",level:"A1",topic:"Zamawianie w barze",type:"dialog",

// ── AUDIO ────────────────────────────────────────────────────────────────────
function getBrowserVoice(lang){
  const vs=window.speechSynthesis.getVoices();
  const bcp=LANG_BCP[lang].slice(0,2);
  const prefs={
    EN:["Daniel","Samantha","Karen","Martha","Google UK English Female","Google UK English Male"],
    FR:["Thomas","Amélie","Amelie","Marie","Google français","Google French"],
    IT:["Alice","Luca","Google italiano","Google Italian"]
  }[lang]||[];
  for(const p of prefs){const v=vs.find(x=>x.name===p);if(v)return v;}
  const lv=vs.filter(x=>x.lang.toLowerCase().startsWith(bcp));
  return lv.find(x=>/enhanced|premium/i.test(x.name))||lv[0]||null;
}

function browserSpeak(text,lang){
  return new Promise(res=>{
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    const v=getBrowserVoice(lang);
    if(v){u.voice=v;u.lang=v.lang;}
    else{u.lang=LANG_BCP[lang];}
    u.rate=S.voiceRate;u.pitch=1.0;
    u.onend=res;u.onerror=res;
    window.speechSynthesis.speak(u);
  });
}

async function elSpeak(text,lang){
  const vid=EL_VOICES[lang].id;
  const r=await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${vid}`,{
    method:"POST",
    headers:{"xi-api-key":S.elKey,"Content-Type":"application/json"},
    body:JSON.stringify({text,model_id:"eleven_multilingual_v2",
      voice_settings:{stability:0.45,similarity_boost:0.82,style:0.25,use_speaker_boost:true}})
  });
  if(!r.ok)throw new Error("EL "+r.status);
  const blob=await r.blob();
  const url=URL.createObjectURL(blob);
  return new Promise((res,rej)=>{
    const a=new Audio(url);
    a.playbackRate=S.voiceRate;
    a.onended=()=>{URL.revokeObjectURL(url);res();};
    a.onerror=rej;a.play();
  });
}

async function speak(text,lang){
  try{if(S.elKey)await elSpeak(text,lang);else await browserSpeak(text,lang);}
  catch(e){console.log("EL err, fallback:",e.message);await browserSpeak(text,lang);}
}

async function playDialog(dialog,lang){
  const flag={v:false};
  set({playing:true,abort:flag,playingLine:0});
  for(let i=0;i<dialog.length;i++){
    if(flag.v)break;
    set({playingLine:i});
    await speak(dialog[i].l,lang);
    if(flag.v)break;
    await new Promise(r=>setTimeout(r,400));
  }
  set({playing:false,playingLine:-1});
}
function stopDialog(){S.abort.v=true;window.speechSynthesis.cancel();set({playing:false,playingLine:-1});}

function rateLabel(v){
  if(v<=0.78)return "Bardzo wolno";
  if(v<=0.9)return "Wolno";
  if(v<=1.05)return "Normalnie";
  if(v<=1.2)return "Szybko";

}

// ── DOM HELPER ───────────────────────────────────────────────────────────────
function h(tag,props,...ch){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(props||{})){
    if(k==="onclick")el.onclick=v;
    else if(k==="oninput")el.oninput=v;
    else if(k==="onkeydown")el.onkeydown=v;
    else if(k==="onchange")el.onchange=v;
    else if(k==="class")el.className=v;
    else if(k==="style")el.style.cssText=v;
    else el.setAttribute(k,v);
  }
  for(const c of ch){
    if(c==null)continue;
    if(typeof c==="string")el.appendChild(document.createTextNode(c));
    else el.appendChild(c);
  }
  return el;
}

      onkeydown:(e)=>{if(e.key==="Enter"&&!submitted)set({submitted:true});}});
    fc.appendChild(inp);
    if(!submitted)fc.appendChild(h("button",{class:"check-btn",onclick:()=>set({submitted:true})},"Sprawdź ✓"));
    if(submitted){
      fc.appendChild(h("div",{class:"feedback "+(ok?"ok":"bad")},ok?"✓ Brawo! Poprawnie!":"✗ Poprawna odpowiedź: "+card.a));
      fc.appendChild(h("button",{class:"next-btn",onclick:()=>{set({score:{c:ok?S.score.c+1:S.score.c,t:S.score.t+1}});nextCard();}},"Następne →"));
    }
    w.appendChild(fc);
  }
  return w;
}

function renderResults(){
  const{score,lesson,mode,lang}=S;
  const pct=score.t>0?score.c/score.t:0;
  const w=h("div",{});
  const c=h("div",{class:"result-card"});
  c.appendChild(h("div",{style:"font-size:52px;margin-bottom:10px"},pct>=.8?"🏆":pct>=.5?"💪":"📚"));
  c.appendChild(h("div",{style:"font-size:24px;font-weight:700;margin-bottom:6px"},"Sesja zakończona!"));
  c.appendChild(h("div",{style:"font-size:15px;color:#888;margin-bottom:24px"},score.c+" / "+score.t+" poprawnych"));
  const br=h("div",{style:"display:flex;gap:8px"});
  br.appendChild(h("button",{class:"primary",onclick:()=>startPractice(lesson,mode)},"🔄 Jeszcze raz"));
  br.appendChild(h("button",{class:"primary",style:"background:#fff;color:#2563eb;border:1.5px solid #93c5fd",onclick:()=>set({screen:"lesson",mode:"dialog",playing:false,playingLine:-1})},"💬 Dialog"));
  br.appendChild(h("button",{class:"primary",style:"background:#fff;color:#666;border:1px solid #e8e8e4",onclick:()=>set({screen:"lang"})},"← Lekcje"));
  c.appendChild(br);
  w.appendChild(c);
  return w;
}

function renderSettings(){
  const{elKeyInput,elMsg,elKey,voiceRate}=S;
  const w=h("div",{});
  w.appendChild(h("div",{class:"header"},
    h("button",{class:"back-btn",style:"margin:0",onclick:()=>set({screen:S.lang?"lang":"home"})},"← Powrót"),
    h("span",{style:"font-weight:700"},"🎙️ Ustawienia lektora"),
    h("div",{style:"width:60px"})
  ));

  const panel=h("div",{class:"settings-panel"});
  panel.appendChild(h("div",{class:"settings-title"},"ElevenLabs — naturalne głosy AI"));
  panel.appendChild(h("div",{class:"settings-sub"},
    "Darmowe konto na elevenlabs.io → Developers → API Keys → Create Key.\nKlucz widoczny tylko raz — skopiuj go od razu!"));

  // Voice test rows
  panel.appendChild(h("div",{class:"sec-label"},"Głosy lektorów"));
  [["EN","Sarah","British English"],["FR","Charlotte","Français"],["IT","Jessica","Italiano"]].forEach(([lc,name,desc])=>{
    const row=h("div",{class:"vtest-row"});
    row.appendChild(h("div",{},
      h("div",{style:"font-size:13px;font-weight:600"},LANGS[lc].flag+" "+name),
      h("div",{style:"font-size:12px;color:#aaa"},desc)
    ));
    row.appendChild(h("button",{class:"sbtn",onclick:async()=>{
      const txt={EN:"Hello! I'm your English teacher.",FR:"Bonjour ! Je suis votre professeur de français.",IT:"Ciao! Sono la tua insegnante di italiano."}[lc];
      await speak(txt,lc);
    }},"▶ Test"));
    panel.appendChild(row);
  });

  // Rate slider
  panel.appendChild(h("div",{class:"sec-label",style:"margin-top:16px"},"Szybkość mówienia"));
  const rateRow=h("div",{style:"display:flex;align-items:center;gap:12px;margin-bottom:16px"});
  const rateVal=h("span",{style:"font-size:13px;color:#666;min-width:110px;text-align:right"},rateLabel(voiceRate));
  const slider=h("input",{type:"range",min:"0.7",max:"1.4",step:"0.05",value:String(voiceRate),style:"flex:1",
    oninput:(e)=>{const v=parseFloat(e.target.value);rateVal.textContent=rateLabel(v);set({voiceRate:v});localStorage.setItem("lingua_rate",String(v));}});
  rateRow.appendChild(slider);
  rateRow.appendChild(rateVal);
  panel.appendChild(rateRow);

  // API key
  panel.appendChild(h("div",{class:"sec-label"},"Klucz API"));
  const ki=h("input",{type:"password",class:"key-inp",placeholder:"sk_...",value:elKeyInput,
    oninput:(e)=>set({elKeyInput:e.target.value,elMsg:""})});
  panel.appendChild(ki);
  panel.appendChild(h("div",{style:"font-size:11px;color:#bbb;margin-bottom:12px"},
    "Klucz zapisywany tylko lokalnie w Twojej przeglądarce."));

  if(elMsg){
    const ok=elMsg.startsWith("ok:");
    panel.appendChild(h("div",{class:ok?"msg-ok":"msg-err"},elMsg.slice(3)));
  }
  if(elKey&&!elMsg)panel.appendChild(h("div",{class:"msg-ok"},"✓ ElevenLabs aktywny"));

  const br=h("div",{class:"row"});
  br.appendChild(h("button",{class:"sbtn",onclick:testElKey},"Testuj klucz"));
  br.appendChild(h("button",{class:"primary",onclick:()=>{
    const k=S.elKeyInput.trim();
    localStorage.setItem("lingua_el_key",k);
    set({elKey:k,elMsg:"ok:Klucz zapisany!"});
  }},"✓ Zapisz"));
  if(elKey)br.appendChild(h("button",{class:"sbtn danger",onclick:()=>{
    localStorage.removeItem("lingua_el_key");
    set({elKey:"",elKeyInput:"",elMsg:""});
  }},"Usuń"));
  panel.appendChild(br);
  w.appendChild(panel);
  return w;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const root=document.getElementById("root");
  root.innerHTML="";
  const{screen}=S;
  if(screen==="home")root.appendChild(renderHome());
  else if(screen==="lang")root.appendChild(renderLang());
  else if(screen==="lesson")root.appendChild(renderLesson());
  else if(screen==="practice")root.appendChild(renderPractice());
  else if(screen==="results")root.appendChild(renderResults());
  else if(screen==="settings")root.appendChild(renderSettings());
}

window.speechSynthesis.onvoiceschanged=()=>{};
setTimeout(render,50);
</script>
</body>
</html>
